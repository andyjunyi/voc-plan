<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中英文會考單字學習計畫</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f9ff;--surface:#fff;--border:#e0f2fe;--text:#1e293b;--muted:#64748b;--green:#0d9488;--red:#dc2626;--primary:#1e6c93;--primary-hover:#155a7a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HERO */
.hero{background:linear-gradient(135deg,#1e6c93 0%,#0ea5c9 55%,#00bad4 100%);color:white;padding:48px 24px 0;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 60%,rgba(255,255,255,.2) 0%,transparent 50%),radial-gradient(ellipse at 85% 15%,rgba(255,241,95,.22) 0%,transparent 45%);}
.hero-inner{position:relative;max-width:900px;margin:0 auto;}
.hero-badge{display:inline-block;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:100px;padding:4px 16px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;}
.hero h1{font-size:clamp(22px,5vw,38px);font-weight:900;letter-spacing:-.03em;margin-bottom:10px;line-height:1.2;}
.hero h1 span{color:#fbbf24;}
.hero p{color:rgba(255,255,255,.8);font-size:14px;margin-bottom:32px;}

.grade-selector{display:flex;gap:0;justify-content:center;overflow-x:auto;scrollbar-width:none;}
.grade-selector::-webkit-scrollbar{display:none;}
.grade-btn{flex-shrink:0;padding:14px 20px 18px;border:none;border-bottom:3px solid transparent;background:transparent;color:rgba(255,255,255,.65);font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:12px 12px 0 0;}
.grade-btn:hover{color:white;background:rgba(255,255,255,.12);}
.grade-btn.active{color:white;background:rgba(255,255,255,.18);border-bottom-color:var(--gc);}
.grade-btn .g-emoji{font-size:20px;}
.grade-btn .g-name{font-size:18px;font-weight:900;color:var(--gc);}
.grade-btn .g-desc{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;opacity:.6;}

.grade-panel{background:var(--surface);padding:18px 24px;border-bottom:1px solid var(--border);}
.grade-panel-inner{display:flex;gap:20px;align-items:center;flex-wrap:wrap;max-width:900px;margin:0 auto;}
.gp-badge{padding:6px 16px;border-radius:100px;font-weight:900;font-size:20px;border:2px solid;white-space:nowrap;}
.gp-info{flex:1;}
.gp-title{font-size:16px;font-weight:800;margin-bottom:4px;}
.gp-stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;}
.gp-stat{text-align:center;}
.gp-stat-num{font-size:20px;font-weight:900;display:block;font-family:'DM Mono',monospace;}
.gp-stat-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

.filter-bar{position:sticky;top:0;z-index:50;background:rgba(240,249,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;}
.filter-inner{max-width:900px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 14px;border-radius:100px;border:1.5px solid var(--border);font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;background:white;color:var(--muted);}
.filter-btn:hover{border-color:#64748b;color:var(--text);}
.filter-btn.active{color:white;border-color:transparent;background:var(--primary);}
.filter-btn.f-done.active{background:var(--green);}
.filter-label{font-size:12px;color:var(--muted);font-weight:600;}

.container{max-width:900px;margin:0 auto;padding:24px 20px 80px;}

.prog-section{margin-bottom:20px;}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.prog-count{font-size:13px;font-weight:800;}
.prog-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.4,0,.2,1);}

.milestone-banner{border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;border:2px solid;animation:fadeIn .3s ease;}
.ms-emoji{font-size:26px;flex-shrink:0;}
.ms-title{font-size:15px;font-weight:900;}
.ms-sub{font-size:12px;opacity:.7;margin-top:2px;}

.week-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:all .2s;margin-bottom:10px;}
.week-card:hover{border-color:#94a3b8;box-shadow:0 3px 16px rgba(0,0,0,.06);}
.week-card.done-card{opacity:.75;}

.week-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;}
.week-badge{width:52px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.week-badge .wb-num{font-size:16px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
.week-badge .wb-label{font-size:8px;font-weight:800;letter-spacing:.06em;opacity:.65;margin-top:1px;}
.week-meta-info{flex:1;min-width:0;}
.week-title{font-size:15px;font-weight:800;margin-bottom:3px;}
.week-sub{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.topic-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;background:var(--border);color:var(--muted);}
.week-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.week-words-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.week-cum{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.chevron{width:16px;height:16px;color:var(--muted);transition:transform .3s;}
.week-card.expanded .chevron{transform:rotate(180deg);}

.week-body{display:none;padding:0 18px 18px;}
.week-card.expanded .week-body{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Tab switcher inside week */
.week-tabs{display:flex;gap:6px;margin-bottom:14px;padding-top:14px;border-top:1px solid var(--border);}
.week-tab{padding:6px 16px;border-radius:8px;border:1.5px solid var(--border);font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;background:white;color:var(--muted);}
.week-tab:hover{border-color:#64748b;color:var(--text);}
.week-tab.active{background:var(--primary);color:white;border-color:var(--primary);}

/* Vocabulary list (original) */
.days-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}
.day-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.day-header{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.day-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;font-family:'DM Mono',monospace;flex-shrink:0;}
.day-title{font-size:13px;font-weight:800;flex:1;}
.day-count{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.word-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.word-item{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.word-en{font-size:13px;font-weight:800;flex-shrink:0;}
.word-ph{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.word-zh{font-size:11px;color:#64748b;font-weight:600;}
.cefr-badge{display:inline-block;font-size:8px;font-weight:800;padding:1px 4px;border-radius:4px;font-family:'DM Mono',monospace;flex-shrink:0;}

/* ── PRACTICE PANEL ── */


/* ── DAY PRACTICE ── */
.day-practice-btns{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:#f8fafc;}
.day-prac-btn{flex:1;padding:5px 0;border-radius:7px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .2s;color:var(--muted);text-align:center;}
.day-prac-btn:hover{border-color:#64748b;color:var(--text);}
.day-prac-btn.active{background:var(--primary);color:white;border-color:var(--primary);}

/* Day practice inline panel */
.day-panel{display:none;padding:12px 14px;border-top:1px solid var(--border);background:#f8fafc;border-radius:0 0 12px 12px;}
.day-panel.open{display:block;animation:fadeIn .2s ease;}

/* ── FLASHCARD ── */
.fc-wrap{perspective:1200px;margin-bottom:12px;}
.fc-card{
  width:100%;max-width:420px;margin:0 auto;
  aspect-ratio:5/3;position:relative;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  cursor:pointer;border-radius:16px;
}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:16px;border:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;
}
.fc-front{background:white;}
.fc-back{background:#f8fafc;transform:rotateY(180deg);}
.fc-hint{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.1em;margin-bottom:10px;}
.fc-word{font-size:clamp(24px,5vw,36px);font-weight:900;color:#1e6c93;margin-bottom:6px;}
.fc-ph{font-family:'DM Mono',monospace;font-size:16px;color:var(--muted);margin-bottom:4px;}
.fc-pos{font-size:11px;font-family:'DM Mono',monospace;font-weight:700;margin-bottom:0;}
.fc-zh{font-size:clamp(14px,3.2vw,22px);font-weight:800;color:var(--text);margin-bottom:8px;}
.fc-ex{font-size:16px;color:#374151;line-height:1.7;max-width:340px;}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;}
.fc-nav-btn{padding:7px 20px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;color:var(--muted);}
.fc-nav-btn:hover{border-color:#64748b;color:var(--text);}
.fc-nav-btn:disabled{opacity:.3;cursor:default;}
.fc-nav-btn.primary{background:var(--primary);color:white;border-color:var(--primary);}
.fc-nav-btn.primary:hover{background:var(--primary-hover);}
.fc-counter{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);min-width:60px;text-align:center;}
.fc-prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px;max-width:420px;margin-left:auto;margin-right:auto;}
.fc-prog-fill{height:100%;border-radius:2px;transition:width .3s ease;}
.fc-result{text-align:center;padding:24px;background:white;border-radius:12px;border:1.5px solid var(--border);}

.practice-panel{background:var(--bg);border-radius:12px;padding:16px;}

/* Typing exercise */
.typing-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.typing-header h3{font-size:14px;font-weight:800;color:var(--text);}
.typing-score{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;}

.typing-card{background:white;border:1.5px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:10px;}
.typing-progress{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px;}
.typing-zh{font-size:22px;font-weight:900;color:var(--text);margin-bottom:6px;}
.typing-hint{font-size:12px;color:var(--muted);margin-bottom:16px;}
.typing-input{width:100%;max-width:280px;padding:10px 16px;border:2px solid var(--border);border-radius:10px;font-family:'DM Mono',monospace;font-size:16px;font-weight:700;text-align:center;outline:none;transition:border-color .2s;background:white;text-transform:lowercase;}
.typing-input:focus{border-color:var(--primary);}
.typing-input.correct{border-color:var(--green);background:#f0fdfc;color:var(--green);}
.typing-input.wrong{border-color:var(--red);background:#fef2f2;color:var(--red);}
.typing-feedback{min-height:24px;font-size:13px;font-weight:700;margin-top:8px;}
.typing-feedback.ok{color:var(--green);}
.typing-feedback.err{color:var(--red);}
.typing-nav{display:flex;gap:8px;justify-content:center;margin-top:12px;}
.t-btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;transition:all .2s;}
.t-btn-primary{background:var(--primary);color:white;}
.t-btn-primary:hover{background:var(--primary-hover);}
.t-btn-skip{background:var(--border);color:var(--muted);}
.t-btn-skip:hover{background:#cbd5e1;}

/* MCQ exercise */
.mcq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mcq-header h3{font-size:14px;font-weight:800;}
.mcq-score{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;}
.mcq-card{background:white;border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:10px;}
.mcq-progress{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px;}
.mcq-q{font-size:16px;font-weight:700;color:var(--text);line-height:1.7;margin-bottom:16px;}
.mcq-blank{display:inline-block;border-bottom:3px solid var(--primary);min-width:80px;height:22px;margin:0 4px;vertical-align:bottom;}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mcq-opt{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;text-align:center;}
.mcq-opt:hover:not(:disabled){border-color:var(--primary);background:#e0f2fe;}
.mcq-opt.correct{border-color:var(--green)!important;background:#f0fdfc!important;color:var(--green);}
.mcq-opt.wrong{border-color:var(--red)!important;background:#fef2f2!important;color:var(--red);}
.mcq-opt.faded{opacity:.35;}
.mcq-opt:disabled{cursor:default;}
.mcq-explanation{margin-top:12px;padding:12px 14px;background:#f8fafc;border-radius:8px;font-size:12px;color:#475569;line-height:1.7;border:1px solid var(--border);}
.mcq-explanation .exp-label{font-weight:800;color:#1e293b;}

/* Results */
.practice-result{text-align:center;padding:28px 20px;background:white;border-radius:12px;border:1.5px solid var(--border);}
.result-big{font-size:44px;font-weight:900;font-family:'DM Mono',monospace;margin-bottom:4px;}
.result-msg{font-size:15px;font-weight:700;margin-bottom:16px;}
.result-retry{padding:9px 24px;border-radius:8px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;background:var(--primary);color:white;margin:4px;}
.result-retry:hover{background:var(--primary-hover);}

.week-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.mark-btn{padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;transition:all .2s;background:#f1f5f9;color:var(--muted);}
.mark-btn:hover{background:#e2e8f0;}
.mark-btn.done{background:#cffafe;color:var(--green);}
.week-cum-words{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
@media(max-width:600px){.days-grid{grid-template-columns:1fr;}.mcq-opts{grid-template-columns:1fr;}.grade-btn{padding:10px 12px 14px;}.grade-btn .g-name{font-size:15px;}}

/* ══ FULLSCREEN PRACTICE MODAL ══ */
.prac-modal{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#f0f9ff 0%,#ecfeff 60%,#f0fdfe 100%);
  flex-direction:column;
  overflow:hidden;
}
.prac-modal.open{ display:flex; animation:modalIn .25s ease; }
@keyframes modalIn{ from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }

/* Modal top bar */
.pm-topbar{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  background:linear-gradient(135deg,#1e6c93 0%,#0ea5c9 100%);
  border-bottom:none;
  box-shadow:0 2px 10px rgba(30,108,147,.25);
  flex-shrink:0;
}
.pm-back{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,.18);border:none;
  cursor:pointer;color:white;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.pm-back:hover{background:rgba(255,255,255,.3);}
.pm-title{ flex:1; }
.pm-title .pm-week{font-size:11px;color:rgba(255,255,255,.75);font-family:'DM Mono',monospace;letter-spacing:.08em;}
.pm-title .pm-day{font-size:16px;font-weight:800;color:white;}
.pm-word-count{font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,.75);}

/* Mode tabs */
.pm-tabs{
  display:flex;gap:6px;padding:10px 20px;
  background:white;border-bottom:1px solid #e0f2fe;
  box-shadow:0 2px 6px rgba(0,0,0,.04);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.pm-tabs::-webkit-scrollbar{display:none;}
.pm-tab{
  flex-shrink:0;padding:7px 18px;border-radius:20px;
  border:1.5px solid #bae6fd;background:white;
  color:#64748b;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.pm-tab:hover{color:var(--primary);border-color:var(--primary);background:#f0f9ff;}
.pm-tab.active{background:var(--primary);color:white;border-color:var(--primary);}

/* Modal content area */
.pm-content{
  flex:1;overflow-y:auto;
  padding:24px 20px;
  display:flex;flex-direction:column;
  align-items:center;
}
.pm-content-inner{ width:100%;max-width:560px; }

/* Light theme overrides inside modal */
.pm-content .typing-card{ background:white;border-color:#e0f2fe;box-shadow:0 2px 12px rgba(30,108,147,.08); }
.pm-content .typing-input{ background:white;border-color:#bae6fd;color:var(--text); }
.pm-content .typing-input:focus{ border-color:var(--primary); }
.pm-content .typing-input.correct{ border-color:var(--green);background:#f0fdfc;color:var(--green); }
.pm-content .typing-input.wrong{ border-color:var(--red);background:#fef2f2;color:var(--red); }
.pm-content .typing-zh{ color:var(--text); }
.pm-content .typing-hint{ color:var(--muted); }
.pm-content .typing-progress{ color:var(--muted); }
.pm-content .mcq-card{ background:white;border-color:#e0f2fe;box-shadow:0 2px 12px rgba(30,108,147,.08); }
.pm-content .mcq-q{ color:var(--text); }
.pm-content .mcq-opt{ background:#f8fbff;border-color:#bae6fd;color:var(--text); }
.pm-content .mcq-opt:hover:not(:disabled){ background:#e0f2fe;border-color:var(--primary); }
.pm-content .mcq-explanation{ background:#f0f9ff;border-color:#e0f2fe;color:#475569; }
.pm-content .fc-face.fc-front{ background:white;border-color:#e0f2fe;box-shadow:0 4px 20px rgba(30,108,147,.1); }
.pm-content .fc-face.fc-back{ background:#f0f9ff;border-color:#e0f2fe;box-shadow:0 4px 20px rgba(30,108,147,.1); }
.pm-content .fc-word{ color:var(--primary); }
.pm-content .fc-ph{ color:var(--muted); }
.pm-content .fc-zh{ color:var(--text); }
.pm-content .fc-ex{ color:#374151;font-size:16px; }
.pm-content .fc-hint{ color:#94a3b8; }
.pm-content .fc-nav-btn{ background:white;border-color:#bae6fd;color:var(--muted); }
.pm-content .fc-nav-btn:hover:not(:disabled){ border-color:var(--primary);color:var(--primary); }
.pm-content .fc-nav-btn.primary{ background:var(--primary);color:white;border-color:var(--primary); }
.pm-content .fc-nav-btn.primary:hover{ background:var(--primary-hover); }
.pm-content .fc-counter{ color:var(--muted); }
.pm-content .fc-prog{ background:#e0f2fe; }
.pm-content .t-btn-primary{ background:var(--primary);color:white; }
.pm-content .t-btn-primary:hover{ background:var(--primary-hover); }
.pm-content .t-btn-skip{ background:white;color:var(--muted);border:1.5px solid #e0f2fe; }
.pm-content .t-btn-skip:hover{ background:#f0f9ff;border-color:#bae6fd; }
.pm-content .practice-result{ background:white;border-color:#e0f2fe;box-shadow:0 2px 12px rgba(30,108,147,.08); }
.pm-content .result-big{ color:var(--primary); }
.pm-content .result-msg{ color:var(--text); }
.pm-content .result-retry{ background:var(--primary);color:white; }
.pm-content .result-retry:hover{ background:var(--primary-hover); }

/* Vocab list in modal (light) */
.pm-vocab{ display:flex;flex-direction:column;gap:8px;width:100%; }
.pm-vocab-item{
  background:white;border:1.5px solid #e0f2fe;
  border-radius:10px;padding:12px 16px;
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  box-shadow:0 1px 6px rgba(30,108,147,.06);
}
.pm-vocab-item .ve{ font-size:15px;font-weight:800;color:var(--primary); }
.pm-vocab-item .vp{ font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8; }
.pm-vocab-item .vz{ font-size:13px;color:#475569;font-weight:600; }
.pm-vocab-item .vx{ font-size:14px;color:#374151;width:100%;margin-top:4px;line-height:1.6; }


/* ── LETTER BOX TYPING ── */
.letter-boxes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
.letter-box{
  width:44px;height:52px;
  border-radius:10px;
  border:2px solid #bae6fd;
  background:white;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:20px;font-weight:700;
  color:var(--text);
  transition:all .15s;
  position:relative;
  box-shadow:0 1px 4px rgba(30,108,147,.08);
}
.letter-box.active{border-color:var(--primary);background:#f0f9ff;box-shadow:0 0 0 3px rgba(30,108,147,.15);}
.letter-box.filled{border-color:#7dd3fc;background:#f0f9ff;}
.letter-box.correct{border-color:var(--green);background:#f0fdfc;color:var(--green);}
.letter-box.wrong{border-color:var(--red);background:#fef2f2;color:var(--red);}
.letter-box.reveal{border-color:#f0a500;background:#fffbeb;color:#d97706;}
.letter-box-cursor{
  width:2px;height:28px;background:var(--primary);
  position:absolute;animation:blink .8s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.letter-hidden-input{
  position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;
}

// Practice state per week
const practiceState = {};

function getPracticeState(wk){
  if(!practiceState[wk]) practiceState[wk] = { tab: 'vocab', typing: null, mcq: null };
  return practiceState[wk];
}

function getGrade(id){ return GRADES.find(g => g.grade === id); }

function getTargetWeeks(gradeId){
  const g = getGrade(gradeId);
  if(!g) return [];
  let cum = 0;
  const weeks = [];
  for(const w of PLAN){
    if(cum >= g.word_count) break;
    weeks.push(w);
    cum += w.total_words;
  }
  return weeks;
}

function openPracticeModal(wk, dayNum, mode){
  const w = PLAN.find(p => p.week === wk);
  const day = w.days.find(d => d.day === dayNum);
  modalState.wk = wk;
  modalState.day = dayNum;
  modalState.mode = mode;
  modalState.words = day.words;
  modalState.level = w.level;
  modalState.dayLabel = DAY_LABELS[dayNum] + '　' + day.main_topic;
  modalState.weekLabel = '第 ' + wk + ' 週　' + w.main_topic;
  modalState.data = {};

  document.getElementById('prac-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderModal();
}

function closeModal(){
  document.getElementById('prac-modal').classList.remove('open');
  document.body.style.overflow = '';
  // cleanup keyboard
  if(modalState._key){ document.removeEventListener('keydown', modalState._key); modalState._key=null; }
}

  renderModalContent();

  if(mode === 'typing') renderModalTyping(inner);
  if(mode === 'mcq')    renderModalMcq(inner);
}

function getWordForms(word) {
  const w = word.toLowerCase();
  const V = 'aeiou';
  const forms = new Set([w]);

  const endsE = w.endsWith('e');
  const endsY = w.endsWith('y') && w.length > 2 && !V.includes(w[w.length - 2]);
  const cvc = w.length >= 3 && !V.includes(w[w.length-1]) && V.includes(w[w.length-2]) && !V.includes(w[w.length-3]) && !/[wxh]/.test(w[w.length-1]);

  // +s / +es
  if (endsY) { forms.add(w.slice(0,-1) + 'ies'); }
  else if (/[szxo]$|[cs]h$/.test(w)) { forms.add(w + 'es'); }
  else { forms.add(w + 's'); }

  // past tense +ed
  if (endsY)      { forms.add(w.slice(0,-1) + 'ied'); }
  else if (endsE) { forms.add(w + 'd'); }
  else if (cvc)   { forms.add(w + w[w.length-1] + 'ed'); }
  else            { forms.add(w + 'ed'); }

  // present participle +ing
  if (endsE && w.length > 2) { forms.add(w.slice(0,-1) + 'ing'); }
  else if (cvc)              { forms.add(w + w[w.length-1] + 'ing'); }
  else                       { forms.add(w + 'ing'); }

  // comparative / superlative
  if (endsE) { forms.add(w + 'r'); forms.add(w + 'st'); }
  else if (endsY) { forms.add(w.slice(0,-1) + 'ier'); forms.add(w.slice(0,-1) + 'iest'); }
  else if (cvc)   { forms.add(w + w[w.length-1] + 'er'); forms.add(w + w[w.length-1] + 'est'); }
  else            { forms.add(w + 'er'); forms.add(w + 'est'); }

  // adverb / adjective suffixes
  if (endsY)           { forms.add(w.slice(0,-1) + 'ily'); }  // happy → happily
  else if (endsE)      { forms.add(w + 'ly'); }
  else                 { forms.add(w + 'ly'); }
  if (w.endsWith('ic'))  { forms.add(w + 'ally'); }            // basic → basically

  // noun suffixes (common derivations already covered by +s above; add -ness, -ment, -tion patterns only if base ends accordingly)
  if (w.endsWith('ful'))  { forms.add(w + 'ly'); }
  if (w.endsWith('able') || w.endsWith('ible')) { forms.add(w + 'r'); forms.add(w + 'st'); }

  return [...forms].sort((a, b) => b.length - a.length); // longest first to prevent partial shadowing
}

function highlightWord(sentence, word) {
  if (!sentence || !word) return sentence || '';
  const forms = getWordForms(word).map(f => f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = forms.join('|');
  return sentence.replace(new RegExp(`\\b(${pattern})\\b`, 'gi'), '<strong style="text-decoration:underline">$1</strong>');
}

// ── MODAL TYPING ──
function renderModalTyping(container){
  const { words } = modalState;
  const s = modalState.data;
  if(!s.typing) s.typing = { words:[...words].sort(()=>Math.random()-.5), idx:0, score:0, input:[], submitted:false };
  const t = s.typing;

  if(t.idx >= t.words.length){
    const pct = Math.round(t.score/t.words.length*100);
    container.innerHTML = `<div class="practice-result" style="margin-top:20px">
      <div class="result-big">${t.score}/${t.words.length}</div>
      <div class="result-msg">${pct>=90?'🏆 太厲害了！':pct>=70?'👍 不錯！':'📚 再練習！'}　正確率 ${pct}%</div>
      <button class="result-retry" onclick="modalState.data.typing=null;renderModalContent()">重新練習</button>
    </div>`;
    return;
  }

  const cur = t.words[t.idx];
  const answer = cur.word.toLowerCase();
  const len = answer.length;
  if(!t.input) { t.input = []; t.submitted = false; }

  // Build letter boxes
  const boxes = Array.from({length:len}, (_,i) => {
    const ch = t.input[i] || '';
    const isActive = !t.submitted && i === t.input.length && i < len;
    const isFilled = ch !== '';
    let cls = 'letter-box';
    if(t.submitted){
      cls += ch.toLowerCase() === answer[i] ? ' correct' : ' wrong';
    } else {
      if(isActive) cls += ' active';
      else if(isFilled) cls += ' filled';
    }
    return `<div class="${cls}" id="lb-${i}">
      ${ch ? ch.toLowerCase() : (isActive ? '<div class="letter-box-cursor"></div>' : '')}
    </div>`;
  }).join('');

  const feedbackHtml = t.submitted ? (() => {
    const val = t.input.join('').toLowerCase();
    const correct = val === answer;
    return correct
      ? `<div class="typing-feedback ok" style="margin-top:10px">✔ 正確！</div>`
      : `<div class="typing-feedback err" style="margin-top:10px">✘ 正確答案：<strong>${cur.word}</strong></div>`;
  })() : '';

  container.innerHTML = `
    <div class="typing-card" style="margin-top:20px;padding:28px 20px;">
      <div class="typing-progress">${t.idx+1} / ${t.words.length}</div>
      <div class="typing-zh" style="font-size:26px;margin:10px 0 4px">${cur.chinese}</div>
      <div class="typing-hint" style="margin-bottom:20px">${len} 個字母</div>
      <div class="letter-boxes">${boxes}</div>
      ${feedbackHtml}
      <input class="letter-hidden-input" id="modal-lb-inp" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="typing-nav" style="margin-top:14px">
      <button class="t-btn t-btn-skip" onclick="skipModalTyping()">跳過</button>
      ${t.submitted
        ? `<button class="t-btn t-btn-primary" onclick="nextModalTyping()">下一題 →</button>`
        : `<button class="t-btn t-btn-primary" onclick="submitModalTyping()">確認 ↵</button>`}
    </div>`;

  // Focus hidden input and handle keystrokes
  const hiddenInp = document.getElementById('modal-lb-inp');
  if(hiddenInp){
    hiddenInp.focus();
    if(!t.submitted){
      hiddenInp.addEventListener('input', (e) => {
        const val = e.target.value;
        if(!val) return;
        const ch = val[val.length-1];
        e.target.value = '';
        if(/^[a-zA-Z]$/.test(ch) && t.input.length < len){
          t.input.push(ch.toLowerCase());
          renderModalTyping(container);
        }
      });
      hiddenInp.addEventListener('keydown', (e) => {
        if(e.key === 'Backspace'){
          e.preventDefault();
          if(t.input.length > 0){ t.input.pop(); renderModalTyping(container); }
        } else if(e.key === 'Enter'){
          e.preventDefault();
          if(t.input.length > 0) submitModalTyping();
        } else if(e.key === 'Escape'){
          closeModal();
        }
      });
    } else {
      hiddenInp.addEventListener('keydown', (e) => {
        if(e.key === 'Enter'){ e.preventDefault(); nextModalTyping(); }
        else if(e.key === 'Escape'){ closeModal(); }
      });
    }
  }

  // Also handle click on boxes to focus
  document.querySelectorAll('.letter-box').forEach(box => {
    box.addEventListener('click', () => {
      const inp = document.getElementById('modal-lb-inp');
      if(inp) inp.focus();
    });
  });
}

function submitModalTyping(){
  const t = modalState.data.typing;
  if(!t || t.submitted) return;
  const answer = t.words[t.idx].word.toLowerCase();
  const val = t.input.join('').toLowerCase();
  if(val.length === 0) return;
  t.submitted = true;
  const correct = val === answer;
  if(correct){ t.score++; triggerConfetti(); }
  const inner = document.getElementById('pm-inner');
  if(inner) renderModalTyping(inner);
}

function nextModalTyping(){
  const t = modalState.data.typing;
  t.idx++;
  t.input = [];
  t.submitted = false;
  renderModalContent();
}

function skipModalTyping(){
  const t = modalState.data.typing;
  t.idx++;
  t.input = [];
  t.submitted = false;
  renderModalContent();
}

function checkModalTyping(answer){
  // legacy - now handled by submitModalTyping
  submitModalTyping();
}

function renderModalMcq(container){

      .filter(wd => wd.ex_en && wd.ex_en.toLowerCase().includes(wd.word.toLowerCase()))

      }).sort(()=>Math.random()-.5);
    s.mcq = { qs, idx:0, score:0 };

    <div class="mcq-card" style="margin-top:20px">
      <div class="mcq-progress">${m.idx+1} / ${m.qs.length}　✔ ${m.score}</div>
      <div class="mcq-q">${qHtml}</div>

      </div>
      <div id="modal-mcq-exp"></div>
    </div>`;

  if(modalState._key) document.removeEventListener('keydown', modalState._key);
  modalState._key = (e) => { if(e.key==='Escape') closeModal(); };
  document.addEventListener('keydown', modalState._key);
}

function checkModalMcq(chosen, answer){
  const m = modalState.data.mcq;
  const correct = chosen===answer;
  if(correct) m.score++;
  document.querySelectorAll('#modal-mcq-opts .mcq-opt').forEach(btn=>{
    btn.disabled=true;
    if(btn.textContent.trim()===answer) btn.classList.add('correct');
    else if(btn.textContent.trim()===chosen) btn.classList.add('wrong');
    else btn.classList.add('faded');
  });
  const exp = document.getElementById('modal-mcq-exp');
  const nextLabel = m.idx+1>=m.qs.length?'查看成績':'下一題 →';
  exp.innerHTML = mcqExpHtml(m.qs[m.idx], correct, nextLabel, 'modalState.data.mcq.idx++;renderModalContent()');
}

// ── 發音（Google Neural TTS 女聲，快取消除重複延遲）──
const _audioCache = {};
let _femaleVoice = null;

function _initFemaleVoice(){
  if(_femaleVoice || !window.speechSynthesis) return;
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return;
  _femaleVoice =
    voices.find(v => v.lang === 'en-US' && /aria|jenny|michelle|eva|zira/i.test(v.name)) ||
    voices.find(v => v.lang === 'en-US' && /natural|neural|enhanced/i.test(v.name))      ||
    voices.find(v => v.lang === 'en-US' && /google/i.test(v.name))                        ||
    voices.find(v => v.lang === 'en-US')                                                   ||
    voices.find(v => v.lang.startsWith('en'));
}
if(window.speechSynthesis){
  speechSynthesis.addEventListener('voiceschanged', _initFemaleVoice, { once: true });
  _initFemaleVoice();
}

function speakWord(word){
  const key = word.toLowerCase().trim();
  // 建立並快取 Audio 物件（第二次播放直接用快取，無延遲）
  if(!_audioCache[key]){
    const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(key)}&tl=en-us&client=gtx&ttsspeed=0.8`;
    _audioCache[key] = new Audio(url);
  }
  const a = _audioCache[key];
  a.currentTime = 0;
  a.play().catch(() => {
    // 離線或被封鎖時退回瀏覽器 TTS
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    _initFemaleVoice();
    const u = new SpeechSynthesisUtterance(key);
    u.lang = 'en-US'; u.rate = 0.88;
    if(_femaleVoice) u.voice = _femaleVoice;
    speechSynthesis.speak(u);
  });
}

// ── MCQ 解析 helper ──
// chinese 欄位格式："(v.) 允許" 或 "(v.) 弄壞；(n.) 休息"
function mcqParseChinese(str){
  if(!str) return { pos:'', meaning:'' };
  const m = str.match(/^\(([^)]+)\)\s*(.*)/);
  if(m){
    const pos = m[1];                              // "v." / "n." ...
    const meaning = m[2].replace(/\([^)]+\)\s*/g,'').trim();  // 去掉後續 (pos) 前綴
    return { pos, meaning: meaning || m[2] };
  }
  return { pos:'', meaning: str };
}
function mcqExpHtml(q, correct, nextLabel, nextOnclick){
  const { pos, meaning } = mcqParseChinese(q.chinese);
  const statusLine = correct
    ? `<span class="exp-label" style="color:var(--green)">✔ 答對了！</span>　<span style="color:#374151">${q.ex_zh}</span>`
    : `<span class="exp-label" style="color:var(--red)">✘ 答錯了</span>　<span style="color:#374151">${q.ex_zh}</span>`;
  const wordLine = `<span style="font-weight:800;color:var(--primary)">${q.answer}</span>`
    + (q.phonetic ? `　<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${q.phonetic}</span>` : '')
    + (pos        ? `　<span style="font-size:11px;font-weight:700;color:#0891b2">${pos}</span>` : '')
    + `　<span style="color:#374151">${meaning}</span>`;
  return `
    <div class="mcq-explanation">
      <div style="margin-bottom:5px">${statusLine}</div>
      <div>${wordLine}</div>
    </div>
    <div style="text-align:right;margin-top:10px">
      <button class="t-btn t-btn-primary" onclick="${nextOnclick}">${nextLabel}</button>
    </div>`;
}

// ── CONFETTI ──

function triggerConfetti(){

  const colors = ['#1e6c93','#0ea5c9','#00bad4','#f0a500','#f97316','#f472b6','#a78bfa','#34d399','#fde68a','#fb7185'];
  const cvs = document.createElement('canvas');
  cvs.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:999999;';
  cvs.width = window.innerWidth;
  cvs.height = window.innerHeight;
  document.body.appendChild(cvs);
  const ctx = cvs.getContext('2d');
  const cx = cvs.width / 2;
  const cy = cvs.height * 0.56;

  const particles = [];
  for(let i = 0; i < 115; i++){
    const angle = -Math.PI/2 + (Math.random()-0.5) * Math.PI * 1.55;
    const speed = Math.random() * 17 + 9;
    const w = Math.random() * 9 + 4;
    const isRect = Math.random() > 0.42;
    particles.push({
      x: cx + (Math.random()-0.5) * 12,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      grav: 0.36 + Math.random() * 0.2,
      color: colors[i % colors.length],
      w: w,
      h: isRect ? w * 0.36 : w,
      rect: isRect,
      rot: Math.random() * Math.PI * 2,
      rotSpd: (Math.random()-0.5) * 0.3,
      life: 1,
      decay: 0.007 + Math.random() * 0.006
    });
  }

  function draw(){
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    let alive = false;
    for(const p of particles){
      if(p.life <= 0) continue;
      alive = true;
      p.x += p.vx; p.y += p.vy;
      p.vy += p.grav; p.vx *= 0.99;
      p.rot += p.rotSpd;
      p.life = Math.max(0, p.life - p.decay);
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.rect){
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.w/2, p.h/2, 0, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    if(alive) requestAnimationFrame(draw);
    else cvs.remove();
  }
  requestAnimationFrame(draw);
}

// ── TYPING PRACTICE ──
function initTyping(wk){
  const w = PLAN.find(p => p.week === wk);
  const words = w.days.flatMap(d => d.words).map(wd => ({word: wd.word, chinese: wd.chinese}));
  const shuffled = [...words].sort(() => Math.random() - .5);
  practiceState[wk].typing = { words: shuffled, idx: 0, score: 0, done: false, input: [], submitted: false };
}

function renderTyping(wk){
  const s = practiceState[wk].typing;
  if(!s){ initTyping(wk); return renderTyping(wk); }
  const container = document.getElementById('practice-typing-'+wk);
  if(!container) return;

  if(s.done || s.idx >= s.words.length){
    const pct = Math.round(s.score/s.words.length*100);
    let msg = pct>=90?'🏆 太厲害了！':pct>=70?'👍 不錯！繼續加油！':'📚 再多練習幾次！';
    container.innerHTML = `
      <div class="practice-result">
        <div class="result-big" style="color:${pct>=70?'var(--green)':'#d97706'}">${s.score}/${s.words.length}</div>
        <div class="result-msg">${msg}　正確率 ${pct}%</div>
        <button class="result-retry" onclick="initTyping(${wk});renderTyping(${wk})">重新練習</button>
      </div>`;
    return;
  }

  const cur = s.words[s.idx];
  const answer = cur.word.toLowerCase();
  const len = answer.length;
  if(s.submitted === undefined) { s.input = []; s.submitted = false; }

  const boxes = Array.from({length:len}, (_,i) => {
    const ch = s.input[i] || '';
    const isActive = !s.submitted && i === s.input.length && i < len;
    const isFilled = ch !== '';
    let cls = 'letter-box';
    if(s.submitted){
      cls += ch.toLowerCase() === answer[i] ? ' correct' : ' wrong';
    } else {
      if(isActive) cls += ' active';
      else if(isFilled) cls += ' filled';
    }
    return `<div class="${cls}" id="wlb-${wk}-${i}">
      ${ch ? ch.toLowerCase() : (isActive ? '<div class="letter-box-cursor"></div>' : '')}
    </div>`;
  }).join('');

  const feedbackHtml = s.submitted ? (() => {
    const val = s.input.join('').toLowerCase();
    return val === answer
      ? `<div class="typing-feedback ok" style="margin-top:10px">✔ 正確！</div>`
      : `<div class="typing-feedback err" style="margin-top:10px">✘ 正確答案：<strong>${cur.word}</strong></div>`;
  })() : '';

  container.innerHTML = `
    <div class="typing-header">
      <h3>✏️ 中翻英練習</h3>
      <span class="typing-score" style="color:var(--green)">✔ ${s.score}</span>
    </div>
    <div class="typing-card">
      <div class="typing-progress">${s.idx+1} / ${s.words.length}</div>
      <div class="typing-zh">${cur.chinese}</div>
      <div class="typing-hint" style="margin-bottom:16px">${len} 個字母</div>
      <div class="letter-boxes">${boxes}</div>
      ${feedbackHtml}
      <input class="letter-hidden-input" id="wk-lb-inp-${wk}" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="typing-nav" style="margin-top:14px">
      <button class="t-btn t-btn-skip" onclick="skipTyping(${wk})">跳過</button>
      ${s.submitted
        ? `<button class="t-btn t-btn-primary" onclick="nextWeekTyping(${wk})">下一題 →</button>`
        : `<button class="t-btn t-btn-primary" onclick="submitWeekTyping(${wk})">確認 ↵</button>`}
    </div>`;

  const hiddenInp = document.getElementById('wk-lb-inp-'+wk);
  if(hiddenInp){
    hiddenInp.focus();
    if(!s.submitted){
      hiddenInp.addEventListener('input', (e) => {
        const val = e.target.value;
        if(!val) return;
        const ch = val[val.length-1];
        e.target.value = '';
        if(/^[a-zA-Z]$/.test(ch) && s.input.length < len){
          s.input.push(ch.toLowerCase());
          renderTyping(wk);
        }
      });
      hiddenInp.addEventListener('keydown', (e) => {
        if(e.key === 'Backspace'){
          e.preventDefault();
          if(s.input.length > 0){ s.input.pop(); renderTyping(wk); }
        } else if(e.key === 'Enter'){
          e.preventDefault();
          if(s.input.length > 0) submitWeekTyping(wk);
        }
      });
    } else {
      hiddenInp.addEventListener('keydown', (e) => {
        if(e.key === 'Enter'){ e.preventDefault(); nextWeekTyping(wk); }
      });
    }
  }

  container.querySelectorAll('.letter-box').forEach(box => {
    box.addEventListener('click', () => {
      const inp = document.getElementById('wk-lb-inp-'+wk);
      if(inp) inp.focus();
    });
  });
}

function submitWeekTyping(wk){
  const s = practiceState[wk].typing;
  if(!s || s.submitted) return;
  const answer = s.words[s.idx].word.toLowerCase();
  if(s.input.length === 0) return;
  s.submitted = true;
  const correct = s.input.join('').toLowerCase() === answer;
  if(correct){ s.score++; triggerConfetti(); }
  renderTyping(wk);
}

function nextWeekTyping(wk){
  const s = practiceState[wk].typing;
  if(!s) return;
  s.idx++;
  s.input = [];
  s.submitted = false;
  renderTyping(wk);
}

function skipTyping(wk){
  const s = practiceState[wk].typing;
  if(!s) return;
  s.idx++;
  s.input = [];
  s.submitted = false;
  renderTyping(wk);
}

// ── MCQ PRACTICE ──
function initMcq(wk){
  const w = PLAN.find(p => p.week === wk);
  const allWords = w.days.flatMap(d => d.words);
  // Build questions from words with example sentences, replace word with blank
  const qs = allWords
    .filter(wd => wd.ex_en && wd.ex_en.toLowerCase().includes(wd.word.toLowerCase()))
    .map(wd => {
      const q = wd.ex_en.replace(new RegExp(wd.word, 'gi'), '_____');
      // Get 3 wrong options from other words in week
      const others = allWords.filter(w2 => w2.word !== wd.word).sort(() => Math.random()-.5).slice(0,3);
      const opts = [wd.word, ...others.map(o => o.word)].sort(() => Math.random()-.5);
      return { q, answer: wd.word, opts, chinese: wd.chinese, phonetic: wd.phonetic||'', ex_zh: wd.ex_zh||'' };
    })
    .sort(() => Math.random() - .5)
    .slice(0, Math.min(15, allWords.length));

  practiceState[wk].mcq = { qs, idx: 0, score: 0, answered: false };
}

function renderMcq(wk){
  const s = practiceState[wk].mcq;
  if(!s){ initMcq(wk); return renderMcq(wk); }
  const container = document.getElementById('practice-mcq-'+wk);
  if(!container) return;

  if(s.idx >= s.qs.length){
    const pct = Math.round(s.score/s.qs.length*100);
    let msg = pct>=90?'🏆 太厲害了！':pct>=70?'👍 不錯！繼續加油！':'📚 再多練習幾次！';
    container.innerHTML = `
      <div class="practice-result">
        <div class="result-big" style="color:${pct>=70?'var(--green)':'#d97706'}">${s.score}/${s.qs.length}</div>
        <div class="result-msg">${msg}　正確率 ${pct}%</div>
        <button class="result-retry" onclick="initMcq(${wk});renderMcq(${wk})">重新練習</button>
      </div>`;
    return;
  }

  const cur = s.qs[s.idx];
  const qHtml = cur.q.replace('_____','<span class="mcq-blank"></span>');
  const optsHtml = cur.opts.map(opt => `
    <button class="mcq-opt" onclick="checkMcq(${wk},'${opt}','${cur.answer}')">${opt}</button>
  `).join('');

  container.innerHTML = `
    <div class="mcq-header">
      <h3>📝 文意字彙選擇</h3>
      <span class="mcq-score" style="color:var(--green)">✔ ${s.score}</span>
    </div>
    <div class="mcq-card">
      <div class="mcq-progress">${s.idx+1} / ${s.qs.length}</div>
      <div class="mcq-q">${qHtml}</div>
      <div class="mcq-opts" id="mcq-opts-${wk}">${optsHtml}</div>
      <div id="mcq-exp-${wk}"></div>
    </div>`;
}

function checkMcq(wk, chosen, answer){
  const s = practiceState[wk].mcq;
  const cur = s.qs[s.idx];
  const correct = chosen === answer;
  if(correct) s.score++;
  s.answered = true;

  document.querySelectorAll(`#mcq-opts-${wk} .mcq-opt`).forEach(btn => {
    btn.disabled = true;
    if(btn.textContent.trim() === answer) btn.classList.add('correct');
    else if(btn.textContent.trim() === chosen) btn.classList.add('wrong');
    else btn.classList.add('faded');
  });

  const expEl = document.getElementById('mcq-exp-'+wk);
  const nextLabel = s.idx+1>=s.qs.length?'查看成績':'下一題 →';
  expEl.innerHTML = mcqExpHtml(cur, correct, nextLabel, `nextMcq(${wk})`);
}

function nextMcq(wk){
  practiceState[wk].mcq.idx++;
  renderMcq(wk);
}

// ── TAB SWITCHING ──
function switchTab(wk, tab){
  practiceState[wk] = practiceState[wk] || { tab:'vocab', typing:null, mcq:null, flashcard:null };
  practiceState[wk].tab = tab;
  document.querySelectorAll(`#week-tabs-${wk} .week-tab`).forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}-${wk}`).classList.add('active');

  document.getElementById(`panel-vocab-${wk}`).style.display  = tab==='vocab'  ? 'block':'none';
  document.getElementById(`panel-fc-${wk}`).style.display     = tab==='fc'     ? 'block':'none';
  document.getElementById(`panel-typing-${wk}`).style.display = tab==='typing' ? 'block':'none';
  document.getElementById(`panel-mcq-${wk}`).style.display    = tab==='mcq'    ? 'block':'none';

  if(tab==='fc')     renderFlashcard(wk);
  if(tab==='typing') renderTyping(wk);
  if(tab==='mcq')    renderMcq(wk);
}

// ── GRADE & FILTER ──
function getGrade(id){ return GRADES.find(g => g.grade === id); }
function renderGradeSelector(){
  document.getElementById('grade-selector').innerHTML = GRADES.map(g => `
    <button class="grade-btn ${g.grade===currentGrade?'active':''}" style="--gc:${g.color}" onclick="selectGrade('${g.grade}')">
      <span class="g-emoji">${g.emoji}</span>
      <span class="g-name">${g.grade}</span>
      <span class="g-desc">${g.desc}</span>
    </button>`).join('');
}
function renderGradePanel(){
  const g = getGrade(currentGrade);
  const tWeeks = getTargetWeeks(currentGrade);
  const doneCount = tWeeks.filter(w => done.includes(w.week)).length;
  const totalWords = tWeeks.reduce((s,w) => s+w.total_words, 0);
  document.getElementById('grade-panel').innerHTML = `
    <div class="grade-panel-inner">
      <div class="gp-badge" style="color:${g.color};border-color:${g.border};background:${g.bg}">${g.emoji} ${g.grade}</div>
      <div class="gp-info">
        <div class="gp-title">${g.desc}　<span style="font-size:13px;font-weight:600;color:var(--muted)">${g.sub}</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">📚 ${g.cefr}　·　目標 ${g.word_count} 字</div>
        <div class="gp-stats">
          <div class="gp-stat"><span class="gp-stat-num" style="color:${g.color}">${tWeeks.length}</span><span class="gp-stat-label">目標週數</span></div>
          <div class="gp-stat"><span class="gp-stat-num" style="color:${g.color}">${tWeeks.length*3}</span><span class="gp-stat-label">學習天數</span></div>
          <div class="gp-stat"><span class="gp-stat-num" style="color:${g.color}">${totalWords}</span><span class="gp-stat-label">目標字數</span></div>
          <div class="gp-stat"><span class="gp-stat-num" style="color:${g.color}">${doneCount}/${tWeeks.length}</span><span class="gp-stat-label">已完成週</span></div>
        </div>
      </div>
    </div>`;
}
function selectGrade(id){
  currentGrade = id;
  document.querySelectorAll('.grade-btn').forEach(b => {
    b.classList.toggle('active', b.querySelector('.g-name').textContent === id);
  });
  renderGradePanel(); renderList();
}
function filterDone(f, btn){
  currentDoneFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','f-done'));
  btn.classList.add('active');
  if(f==='done') btn.classList.add('f-done');
  renderList();
}
function toggleWeek(wk){ document.getElementById('wk-'+wk).classList.toggle('expanded'); }
function markDone(wk, e){
  e.stopPropagation();
  const idx = done.indexOf(wk);
  if(idx>-1) done.splice(idx,1); else done.push(wk);
  saveDone(); renderGradePanel(); renderList();
}

// ── MAIN RENDER ──
function renderList(){
  const container = document.getElementById('week-list');
  const empty = document.getElementById('empty-state');
  const g = getGrade(currentGrade);
  let filtered = getTargetWeeks(currentGrade);
  if(currentDoneFilter==='done') filtered = filtered.filter(w => done.includes(w.week));
  if(currentDoneFilter==='todo') filtered = filtered.filter(w => !done.includes(w.week));
  if(!filtered.length){ container.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  const tWeeks = getTargetWeeks(currentGrade);
  const doneCount = tWeeks.filter(w => done.includes(w.week)).length;
  const pct = Math.round(doneCount/tWeeks.length*100)||0;

  let html = `
    <div class="prog-section">
      <div class="prog-header">
        <span class="prog-title">${g.emoji} ${g.grade} 目標進度</span>
        <span class="prog-count" style="color:${g.color}">${doneCount} / ${tWeeks.length} 週（${pct}%）</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${g.color}"></div></div>
    </div>`;

  for(const w of filtered){
    const lv = w.level;
    const isDone = done.includes(w.week);

    let msHtml = '';
    for(const ms of (w.milestones||[])){
      const mg = getGrade(ms);
      if(mg) msHtml += `
        <div class="milestone-banner" style="background:${mg.bg};border-color:${mg.border}">
          <span class="ms-emoji">${mg.emoji}</span>
          <div><div class="ms-title" style="color:${mg.color}">🎉 達成 ${mg.grade}（${mg.desc}）目標詞彙量！</div>
          <div class="ms-sub">${mg.sub}</div></div>
        </div>`;
    }

    const daysHtml = w.days.map(d => {
      const wordRows = d.words.map(wd => `
        <div class="word-item">
          <span class="word-en">${wd.word}</span>
          ${wd.phonetic?`<span class="word-ph">${wd.phonetic}</span>`:''}
          <span class="word-zh">${wd.chinese}</span>
          ${wd.cefr?`<span class="cefr-badge" style="background:${LV_BG[lv]};color:${LV_COLORS[lv]}">${wd.cefr}</span>`:''}
        </div>`).join('');
      const dayKey = w.week + '_' + d.day;
      return `<div class="day-card">
        <div class="day-header">
          <div class="day-dot" style="background:${LV_BG[lv]};color:${LV_COLORS[lv]}">${d.day}</div>
          <span class="day-title">${DAY_LABELS[d.day]}　${d.main_topic}</span>
          <span class="day-count">${d.count} 字</span>
        </div>
        <div class="word-list">${wordRows}</div>
        <div style="padding:10px 14px;border-top:1px solid var(--border);background:#e0f2fe;display:flex;flex-direction:column;gap:6px;">
          <button onclick="openPracticeModal(${w.week},${d.day},'fc')" style="width:100%;padding:9px;border-radius:9px;border:none;background:#1e6c93;color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .2s;" onmouseover="this.style.background='#155a7a'" onmouseout="this.style.background='#1e6c93'">
            開始練習 →
          </button>
          <button onclick="printDayWords(${w.week},${d.day})" style="width:100%;padding:7px;border-radius:9px;border:1.5px solid var(--border);background:white;color:#475569;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;" onmouseover="this.style.borderColor='#64748b';this.style.color='#1e293b'" onmouseout="this.style.borderColor='var(--border)';this.style.color='#475569'">
            🖨️ 列印單字表 PDF
          </button>
        </div>
      </div>`;
    }).join('');

    html += `
      ${msHtml}
      <div class="week-card ${isDone?'done-card':''}" id="wk-${w.week}"
           style="${isDone?`background:${g.bg};border-color:${g.border};`:''}">
        <div class="week-header" onclick="toggleWeek(${w.week})">
          <div class="week-badge" style="background:${LV_BG[lv]};color:${LV_COLORS[lv]}">
            <span class="wb-num">W${w.week}</span>
            <span class="wb-label">${LV_LABEL[lv]}</span>
          </div>
          <div class="week-meta-info">
            <div class="week-title">第 ${w.week} 週　${w.main_topic}${isDone?' ✓':''}</div>
            <div class="week-sub">
              ${w.days.map(d=>`<span class="topic-tag">${DAY_LABELS[d.day]}：${d.main_topic}</span>`).join('')}
            </div>
          </div>
          <div class="week-right">
            <span class="week-words-count">${w.total_words} 字／週</span>
            <span class="week-cum">累計 ${w.cumulative_words} 字</span>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>
        <div class="week-body">
          <div class="week-tabs" id="week-tabs-${w.week}">
            <button class="week-tab active" id="tab-vocab-${w.week}" onclick="switchTab(${w.week},'vocab')">📖 單字表</button>
            <button class="week-tab" id="tab-fc-${w.week}" onclick="switchTab(${w.week},'fc')">🃏 翻轉閃卡</button>
            <button class="week-tab" id="tab-typing-${w.week}" onclick="switchTab(${w.week},'typing')">✏️ 中翻英</button>
            <button class="week-tab" id="tab-mcq-${w.week}" onclick="switchTab(${w.week},'mcq')">📝 字彙選擇</button>
          </div>
          <div id="panel-vocab-${w.week}">
            <div class="days-grid">${daysHtml}</div>
          </div>
          <div id="panel-fc-${w.week}" class="practice-panel" style="display:none">
            <div id="practice-fc-${w.week}"></div>
          </div>
          <div id="panel-typing-${w.week}" class="practice-panel" style="display:none">
            <div id="practice-typing-${w.week}"></div>
          </div>
          <div id="panel-mcq-${w.week}" class="practice-panel" style="display:none">
            <div id="practice-mcq-${w.week}"></div>
          </div>
          <div class="week-actions">
            <span class="week-cum-words">完成後累計：${w.cumulative_words} 字</span>
            <button class="mark-btn ${isDone?'done':''}" onclick="markDone(${w.week},event)">
              ${isDone?'✓ 已完成本週':'標記本週完成'}
            </button>
          </div>
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

renderGradeSelector();
renderGradePanel();
renderList();
</script>
